{% extends "base.html" %}
{% block title %}Удалить товар{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5">
                <div class="card-header text-center">
                    <h3>Подтверждение удаления</h3>
                </div>
                <div class="card-body">
                    <p class="text-center">Вы уверены, что хотите удалить товар "{{ object.name }}"?</p>
                    <form method="post" class="text-center">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2">Удалить</button>
                        <a href="{% url 'catalog:product_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
