{% extends 'base.html' %}

{% block title %}Удалить запись{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4">Удалить запись "{{ post.title }}"?</h1>
            <p>Вы уверены, что хотите удалить эту запись блога?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'blog:detail' post.slug %}" class="btn btn-secondary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
